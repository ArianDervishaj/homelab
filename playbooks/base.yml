---
- name: Base configuration for all VMs
  hosts: all
  become: true

  pre_tasks:
    - name: Ensure apt cache is up to date
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: dist
  roles:
    - ssh_hardening

- name: Service VM Foundation
  hosts: homelab
  become: true
  roles:
    - common_tools
    - docker
  tasks:
    - name: Set Hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

