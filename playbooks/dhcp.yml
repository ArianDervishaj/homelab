---
- name: Deploy and config dnsmasq
  hosts: router
  roles:
  - dhcp-server
  become: true
  
  post_tasks:
  - name: Wait for dnsmasq to be listening
    ansible.builtin.wait_for:
      port: 53
      host: 192.168.100.1
      timeout: 30

- name: Modify Network interfaces on hosts
  hosts: all:!router
  become: true
  tasks:
  - name: Install DHCP client
    ansible.builtin.apt:
      name: dhcpcd
      state: present

  - name: Deploy network interfaces config
    ansible.builtin.template:
      src: interfaces.j2
      dest: /etc/network/interfaces
      owner: root
      group: root
      mode: "0644"
    notify: Restart networking

  handlers:
  - name: Restart networking
    ansible.builtin.service:
      name: networking
      state: restarted
