---
- name: Deploy Monitoring Stack
  hosts: monitoring.homelab
  become: true

  pre_tasks:
  - name: Ensure Docker is running
    ansible.builtin.service:
      name: docker
      state: started
      enabled: true

  roles:
  - docker_compose
  tasks:
  - name: Template Homepage services config
    ansible.builtin.template:
      src: homepage-services.yml.j2
      dest: "{{ docker_compose_base_dir }}/{{ docker_compose_stack_name }}/homepage/services.yaml"
      owner: "{{ docker_compose_owner }}"
      group: "{{ docker_compose_group }}"
      mode: "0644"

  - name: Template Homepage setting config
    ansible.builtin.template:
      src: homepage-settings.yml.j2
      dest: "{{ docker_compose_base_dir }}/{{ docker_compose_stack_name }}/homepage/settings.yaml"
      owner: "{{ docker_compose_owner }}"
      group: "{{ docker_compose_group }}"
      mode: "0644"

  - name: Check for image updates
    ansible.builtin.shell: |
      docker compose -f {{ docker_compose_base_dir }}/{{ docker_compose_stack_name }}/docker-compose.yml pull 2>&1
    register: pull_result
    changed_when: "'Downloaded newer image' in pull_result.stdout or 'Pull complete' in pull_result.stdout"

  - name: Restart stack if images updated
    ansible.builtin.systemd:
      name: "{{ docker_compose_stack_name }}"
      state: restarted
    when: pull_result.changed
