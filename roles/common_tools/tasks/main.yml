---
- name: Install common and dev packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - vim
      - git
      - qemu-guest-agent
    state: present
    update_cache: true

- name: Enable and start qemu-guest-agent
  ansible.builtin.systemd:
    name: qemu-guest-agent
    enabled: true
    state: started